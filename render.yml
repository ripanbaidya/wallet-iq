services:
  - type: web
    name: walletiq-api
    runtime: docker
    # Path to Dockerfile relative to repo root
    dockerfilePath: ./backend/Dockerfile
    # Docker build context (where Maven project lives)
    dockerContext: ./backend
    plan: free
    # Render sets PORT automatically; we map it here
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: 8080
      - key: API_VERSION
        value: v1
      # Database (Supabase)
      - key: DB_HOST
        sync: false   # "sync: false" = set manually in Render dashboard
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      # Redis (Upstash)
      - key: REDIS_URL
        sync: false
      # AI (OpenAI)
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: PGVECTOR_DIMENSIONS
        value: "1536"
      # Mail (Gmail)
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      # Razorpay
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      # JWT
      - key: JWT_ACCESS_TOKEN_EXPIRY
        value: "604800000"
      - key: JWT_REFRESH_TOKEN_EXPIRY
        value: "2592000000"
      # CORS
      # Update this AFTER you get your Vercel frontend URL
      - key: CORS_ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /api/v1/actuator/health