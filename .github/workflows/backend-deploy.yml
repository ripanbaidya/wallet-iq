# This workflow:
# 1. Runs on every push to main that touches the backend/
# 2. Runs tests
# 3. Triggers a Render deploy via deploy hook URL

name: Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

jobs:
  # Job 1: Test
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: ./backend
        run: mvn test -B
        # Note: Integration tests that need DB/Redis will be skipped
        # because we don't spin up those services in CI.
        # Unit tests (like EmailVerificationServiceImplTest) will run fine.

  # Job 2: Deploy (only on push to main, not on PRs)
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on direct pushes to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render Deploy
        # RENDER_DEPLOY_HOOK_URL is a secret you add in:
        # GitHub repo → Settings → Secrets and variables → Actions
        # Get the URL from: Render → Your Service → Settings → Deploy Hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            --fail \
            -o /dev/null \
            -w "HTTP Status: %{http_code}\n"

      - name: Deploy triggered
        run: echo "✅ Deploy hook triggered. Check Render dashboard for progress."