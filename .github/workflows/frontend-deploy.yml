# This workflow:
# 1. Runs on every push to main that touches frontend/
# 2. Builds the React app
# 3. Vercel auto-deploys via Git integration (no extra step needed)
#    — this job just validates the build doesn't break

name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'frontend/**'

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./frontend
        # Vercel injects its own env vars during real deploy.
        # For CI build check, we pass a placeholder so the build doesn't fail.
        env:
          VITE_API_BASE_URL: https://placeholder-for-ci.onrender.com/api/v1
        run: npm run build

      - name: Build success
        run: echo "✅ Frontend builds successfully."

# ── Note on Vercel deployment ──────────────────────────────
# Vercel deploys automatically when you push to main via its
# GitHub integration. You do NOT need to add deploy steps here.
# The build above just validates nothing is broken before merge.