spring:

  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/walletiq
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        dimensions: 1536
        distance-type: cosine_distance
        index-type: hnsw
        initialize-schema: false
        schema-name: public
        table-name: vector_store

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          quitwait: false
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

app:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    currency: INR
    subscription-amount: ${SUBSCRIPTION_AMOUNT:19900} # 199
    subscription-days: ${SUBSCRIPTION_DAYS:30}

  security:
    cors:
      enabled: true
      allowed-origins:
        - http://localhost:5173
        - https://walletiq.online
        - https://walletiq-eight.vercel.app

logging:
  level:
    root: info
    com.walletiq: debug
    org.springframework.web: debug
    org.springframework.security: debug
    org.springframework.ai.chat.client.advisor: debug
    org.springframework.data.redis: debug
    org.springframework.cache: trace