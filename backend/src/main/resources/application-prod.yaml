spring:
  config:
    activate:
      on-profile: prod
  autoconfigure:
    exclude:
      - org.springframework.ai.model.ollama.autoconfigure.OllamaEmbeddingAutoConfiguration
      - org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration

  datasource:
    # connect_timeout is in seconds - Fail fast if NeonDB endpoint is unreachable instead of hanging
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&connect_timeout=10
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: WalletIQHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      # NeonDB kills connections at ~5 min. Retire them at 3 min to stay ahead
      max-lifetime: 180000
      # The idle time Must be less than max-lifetime
      idle-timeout: 120000
      # Validates connection is alive before use — catches stale ones immediately
      connection-test-query: SELECT 1
      connection-timeout: ${DB_CONNECTION_TIMEOUT:20000}
      # Sends a keepalive ping every 60s to prevent NeonDB from timing out active connections
      keepalive-time: 60000
      leak-detection-threshold: 60000
      auto-commit: true

  jpa:
    show-sql: false

  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: true

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
          temperature: 0.7
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
    vectorstore:
      pgvector:
        dimensions: ${PGVECTOR_DIMENSIONS:1536}
        distance-type: cosine_distance
        index-type: hnsw
        initialize-schema: false
        schema-name: public
        table-name: vector_store

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
          quitwait: false
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: NEVER

app:
  security:
    cors:
      enabled: true
      allowed-origins:
        - ${CORS_ORIGIN_LOCAL:http://localhost:5173}
        - ${CORS_ORIGIN_VERCEL}
        - ${CORS_ORIGIN_PRIMARY}
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - Authorization
      allow-credentials: true
      max-age: 3600

  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    currency: INR
    subscription-amount: 19900 # amount in paise (₹199)
    subscription-days: 30 # how many days one payment gives

logging:
  level:
    root: warn
    com.walletiq: info
    org.springframework.web: warn
    org.springframework.security: warn
    org.springframework.ai: warn
    org.springframework.data.redis: warn
    org.springframework.cache: warn