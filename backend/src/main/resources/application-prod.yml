# production

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # connect_timeout is in seconds - Fail fast if NeonDB endpoint is unreachable instead of hanging
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require&connect_timeout=10
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ${HIKARI_POOL_NAME}
      auto-commit: true
      minimum-idle: ${HIKARI_POOL_MIN_IDLE}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT}
      max-lifetime: ${HIKARI_MAX_LIFETIME}
      maximum-pool-size: ${HIKARI_POOL_MAX_SIZE}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT}
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION_THRESHOLD}
      # Validates connection is alive before use — catches stale ones immediately
      connection-test-query: SELECT 1
      # Sends a keepalive ping every 60s to prevent NeonDB from timing out active connections
      keepalive-time: 60000

  jpa:
    show-sql: false

  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: ${REDIS_SSL_ENABLED}

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL}
          temperature: 0.7
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL}
    vectorstore:
      pgvector:
        dimensions: ${PGVECTOR_DIMENSIONS}
        distance-type: cosine_distance
        index-type: hnsw
        initialize-schema: false
        schema-name: public
        table-name: vector_store

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${MAIL_SSL_TRUST}
          quitwait: false
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: NEVER

app:
  razorpay:
    key-id: ${RAZORPAY_KEY_ID}
    key-secret: ${RAZORPAY_KEY_SECRET}
    currency: INR
    subscription-amount: ${SUBSCRIPTION_AMOUNT}
    subscription-days: ${SUBSCRIPTION_DAYS}

  security:
    cors:
      enabled: true
      allowed-origins:
        - ${CORS_ORIGIN_LOCAL}
        - ${CORS_ORIGIN_VERCEL}
        - ${CORS_ORIGIN_PRIMARY}
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - Authorization
      allow-credentials: true
      max-age: 3600

logging:
  level:
    root: warn
    com.walletiq: info
    org.springframework.web: warn
    org.springframework.security: warn
    org.springframework.ai: warn
    org.springframework.data.redis: warn
    org.springframework.cache: warn