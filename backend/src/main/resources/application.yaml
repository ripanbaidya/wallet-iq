spring:
  application:
    name: walletiq

  profiles:
    active: prod

  # JSON Serialization
  jackson:
    time-zone: Asia/Kolkata

  # JPA/ Hibernate (shared config)
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false   # Prevents accidental lazy loading
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: false
        generate_statistics: false
        jdbc:
          batch_size: 20  # Batch up to 20 DML statements — good for bulk insert/update
          fetch_size: 50  # Fetch 50 rows at a time — good for pagination
        order_inserts: true
        order_updates: true

  # Flyway - DB Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

# Server
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/${API_VERSION:v1}
    session:
      timeout: 30m
  compression:
    enabled: true  # Enable GZIP compression
  error:
    whitelabel:
      enabled: false
    include-message: never           # Do not expose internal exception messages
    include-binding-errors: never    # Do not expose validation error details
    include-stacktrace: never
    include-exception: false

# Swagger/ OpenAPI
springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    # Prevent loading default restore example
    disable-swagger-default-url: true
    # Show API execution time (ms) in the UI
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    filter: true
    show-actuator: true

# Application-Specific Config
app:
  name: Wallet-IQ
  version: ${APPLICATION_VERSION:1.0.0}
  build-number: ${APPLICATION_BUILD_NUMBER:1.0.0}
  copyright: © 2026 walletiq. All rights reserved
  license:
    name: Apache License 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.txt
  support:
    email: official.ripanbaidya@gmail.com
    working-hours: "Mon-Sun: 9 AM -  5 PM"
  social:
    github: https://github.com/ripanbaidya
  developer:
    name: Ripan Baidya
    email: official.ripanbaidya@gmail.com
  otp:
    expiry-minutes: 5 # OTP is valid for 5 minutes
  mail:
    from: ${MAIL_USERNAME}
    from-name: WalletIQ
  api:
    servers:
      dev:
        - http://localhost:${SERVER_PORT:8080}/api/${API_VERSION:v1}
      prod:
      # - https://api.walletiq.com

  security:
    jwt:
      issuer: "walletiq"
      header: "Authorization"
      prefix: "Bearer "
      access-token:
        expiry: ${JWT_ACCESS_TOKEN_EXPIRY:604800000}
      refresh-token:
        expiry: ${JWT_REFRESH_TOKEN_EXPIRY:2592000000}
    rsa:
      algorithm: "RSA"
      private-key-path: classpath:keys/private_key_pkcs8.pem
      public-key-path: classpath:keys/public_key.pem
    cors:
      enabled: true
      allowed-origins:
        - http://localhost:5173
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - Authorization
      allow-credentials: true
      max-age: 3600