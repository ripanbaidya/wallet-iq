spring:
  application:
    name: walletiq

  profiles:
    active: dev

  jackson:
    time-zone: Asia/Kolkata

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 20
          fetch_size: 50

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/${API_VERSION:v1}
    session:
      timeout: 30m
  compression:
    enabled: true
  error:
    whitelabel:
      enabled: false
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    filter: true

app:
  name: Wallet-IQ
  version: ${APPLICATION_VERSION:1.0.0}
  build-number: ${APPLICATION_BUILD_NUMBER:1.0.0}
  copyright: © 2026 walletiq. All rights reserved
  license:
    name: Apache License 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.txt
  support:
    email: official.ripanbaidya@gmail.com
    working-hours: "Mon-Sat: 9AM - 6PM"
  social:
    github: https://github.com/ripanbaidya
  developer:
    name: Ripan Baidya
    email: official.ripanbaidya@gmail.com

  otp:
    expiry-minutes: 5

  mail:
    from: ${MAIL_USERNAME}
    from-name: WalletIQ

  api:
    servers:
      dev:
        - http://localhost:${SERVER_PORT:8080}/api/${API_VERSION:v1}
      prod:
        - https://api.walletiq.com

  security:
    jwt:
      issuer: "walletiq"
      header: "Authorization"
      prefix: "Bearer "
      access-token:
        expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600000} # 1h
      refresh-token:
        expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000} # 7d

    rsa:
      algorithm: "RSA"
      private-key-path: classpath:keys/private_key.pem
      public-key-path: classpath:keys/public_key.pem

    cors:
      enabled: true
      allowed-origins:
        - http://localhost:5173
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - Authorization
      allow-credentials: true
      max-age: 3600