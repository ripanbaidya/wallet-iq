<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: #ffffff;
            color: #111;
        }

        .box {
            text-align: center;
            max-width: 420px;
            padding: 20px;
        }

        h1 {
            font-size: 72px;
            margin: 0;
            font-weight: 600;
        }

        p {
            margin: 10px 0 25px;
            color: #666;
            font-size: 16px;
        }

        a {
            text-decoration: none;
            border: 1px solid #111;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            color: #111;
            transition: all 0.2s ease;
        }

        a:hover {
            background: #111;
            color: #fff;
        }
    </style>
</head>

<body>

<div class="box">
    <h1>404</h1>
    <p>The page you’re looking for doesn’t exist.</p>
    <a href="/">Return Home</a>
</div>

</body>
</html>
