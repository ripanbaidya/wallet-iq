<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background-color: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 1rem;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .container {
            max-width: 56rem;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background-color: white;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .card > * + * {
            margin-top: 1rem;
        }

        h1 {
            font-size: 2.25rem;
            font-weight: 600;
            color: #1f2937;
        }

        p {
            font-size: 0.875rem;
            color: #4b5563;
        }

        .button {
            display: inline-block;
            border: 1px solid #d1d5db;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            color: #374151;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .button:hover {
            background-color: #f3f4f6;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">

        <h1>404</h1>

        <p>
            The page you're looking for doesn't exist.
        </p>

        <a href="/" class="button">
            Return Home
        </a>

    </div>
</div>

</body>
</html>
