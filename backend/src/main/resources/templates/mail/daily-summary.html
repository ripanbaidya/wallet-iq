<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Daily Summary - WalletIQ</title>
  </head>

  <body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333">
    <h2>WalletIQ - Daily Summary</h2>

    <p>Hello <strong th:text="${name}">User</strong>,</p>

    <p>Here is your financial summary for today.</p>

    <hr />

    <p>
      <strong>Net Balance:</strong>
      <span
        th:text="'₹' + ${#numbers.formatDecimal(netBalance, 1, 'POINT', 2, 'DEFAULT')}"
      >
        ₹0.00
      </span>
    </p>

    <p>
      <strong>Total Income:</strong>
      <span
        th:text="'+₹' + ${#numbers.formatDecimal(totalIncome, 1, 'POINT', 2, 'DEFAULT')}"
      >
        +₹0.00
      </span>
    </p>

    <p>
      <strong>Total Expenses:</strong>
      <span
        th:text="'-₹' + ${#numbers.formatDecimal(totalExpenses, 1, 'POINT', 2, 'DEFAULT')}"
      >
        -₹0.00
      </span>
    </p>

    <p>
      <strong>Transactions:</strong>
      <span th:text="${transactionCount}">0</span>
    </p>

    <p th:if="${transactionCount == 0}">No transactions recorded today.</p>

    <p th:if="${transactionCount > 0}">
      Detailed CSV report attached with this email.
    </p>

    <hr />

    <p style="font-size: 12px; color: #777">© 2026 WalletIQ</p>
  </body>
</html>
