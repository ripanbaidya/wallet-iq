<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Email Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-50 flex items-center justify-center px-4">

<main class="w-full max-w-md bg-white border border-gray-200 rounded-lg p-6 text-center space-y-6">

    <!-- Brand -->
    <a href="#" class="text-lg font-semibold text-blue-600">WalletIQ</a>

    <!-- Content -->
    <div class="space-y-4">
        <h1 class="text-lg font-semibold text-gray-800">Verify Your Email</h1>

        <p class="text-sm text-gray-600">
            Hi <strong th:text="${name}">User</strong>, please use the following code to complete your verification.
        </p>

        <!-- OTP Section -->
        <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 space-y-2">
            <div class="text-2xl font-semibold tracking-widest font-mono text-gray-800"
                 th:text="${otp}">
                000000
            </div>
            <div class="text-sm text-gray-600">
                Expires in <strong th:text="${expiryMinutes}">10</strong> minutes
            </div>
        </div>

        <!-- Warning -->
        <div class="bg-orange-50 border border-orange-200 text-orange-800 text-sm rounded-lg p-3 text-left">
            <strong>Security Note:</strong> Never share this code with anyone. WalletIQ staff will never ask for your
            verification code.
        </div>
    </div>

    <!-- Footer -->
    <footer class="border-t border-gray-200 pt-4 space-y-3">
        <div class="flex justify-center gap-4 text-sm text-gray-600">
            <a href="https://linkedin.com" class="hover:text-blue-600">LinkedIn</a>
            <a href="https://github.com" class="hover:text-blue-600">GitHub</a>
            <a href="https://twitter.com" class="hover:text-blue-600">X</a>
        </div>
        <p class="text-xs text-gray-600">© 2026 WalletIQ. All rights reserved.</p>
    </footer>

</main>

</body>
</html>
