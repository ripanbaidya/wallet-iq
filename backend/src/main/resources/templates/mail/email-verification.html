<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify Your Email — WalletIQ</title>

    <style>

        body {
            margin: 0;
            padding: 0;
            background: #f3f4f6;
            font-family: Arial, Helvetica, sans-serif;
        }

        .wrapper {
            width: 100%;
            padding: 20px 10px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
        }

        /* Header */

        .header {
            padding: 28px 24px;
            text-align: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .header h1 {
            margin: 0;
            font-size: 22px;
            color: #111827;
        }

        /* Body */

        .body {
            padding: 28px;
        }

        .greeting {
            font-size: 15px;
            color: #374151;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        /* OTP BOX */

        .otp-box {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 26px;
            text-align: center;
            margin: 26px 0;
        }

        .otp-label {
            font-size: 13px;
            color: #6b7280;
        }

        .otp {
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 10px;
            color: #2563eb;
            margin-top: 8px;
        }

        .expiry {
            font-size: 13px;
            color: #6b7280;
            margin-top: 10px;
        }

        /* Note */

        .note {
            font-size: 13px;
            color: #9ca3af;
            margin-top: 20px;
            line-height: 1.6;
        }

        /* Footer */

        .footer {
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            padding: 22px;
            border-top: 1px solid #f1f5f9;
        }

        /* Mobile */

        @media screen and (max-width: 600px) {

            .body {
                padding: 22px;
            }

            .otp {
                font-size: 30px;
                letter-spacing: 8px;
            }

            .header h1 {
                font-size: 20px;
            }

        }

    </style>

</head>

<body>

<div class="wrapper">

    <div class="container">

        <!-- Header -->

        <div class="header">
            <h1>💰 WalletIQ</h1>
        </div>

        <!-- Body -->

        <div class="body">

            <p class="greeting">
                Hi <strong th:text="${name}">User</strong>,<br/><br/>
                Use the OTP below to verify your email address.
            </p>

            <div class="otp-box">

                <div class="otp-label">Your Verification Code</div>

                <div class="otp" th:text="${otp}">
                    000000
                </div>

                <div class="expiry">
                    ⏱ This OTP expires in
                    <strong th:text="${expiryMinutes}">10</strong> minutes
                </div>

            </div>

            <p class="note">
                If you did not request this, you can safely ignore this email.<br/>
                Never share this OTP with anyone.
            </p>

        </div>

        <!-- Footer -->

        <div class="footer">
            © 2026 WalletIQ. All rights reserved.
        </div>

    </div>

</div>

</body>
</html>
