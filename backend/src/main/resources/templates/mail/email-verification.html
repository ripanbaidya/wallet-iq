<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Email Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #222;
            line-height: 1.5;
        }

        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #2563eb;
            margin-bottom: 30px;
        }

        .title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 10px;
            color: #111;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 30px;
        }

        .otp-container {
            margin: 30px 0;
        }

        .otp-code {
            background: #f0f5ff;
            padding: 20px;
            border-radius: 8px;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: 8px;
            color: #2563eb;
            font-family: 'Courier New', monospace;
            margin-bottom: 12px;
        }

        .copy-btn {
            padding: 10px 20px;
            font-size: 13px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .copy-btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .copy-btn.copied {
            background: #10b981;
        }

        .timer {
            font-size: 13px;
            color: #888;
            margin-bottom: 20px;
        }

        .warning {
            background: #fef3f2;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #d32f2f;
            margin: 20px 0;
            line-height: 1.4;
        }

        .links {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .links a {
            display: inline-block;
            margin: 0 12px;
            font-size: 13px;
            color: #2563eb;
            text-decoration: none;
            transition: color 0.2s;
        }

        .links a:hover {
            color: #1d4ed8;
        }

        .copyright {
            margin-top: 20px;
            font-size: 11px;
            color: #ccc;
        }

        @media (max-width: 480px) {
            .container {
                margin: 30px auto;
                padding: 30px 16px;
            }

            .otp-code {
                font-size: 28px;
                letter-spacing: 6px;
            }

            .copy-btn {
                padding: 9px 16px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">WalletIQ</div>

    <h1 class="title">Verify Your Email</h1>
    <p class="subtitle">Hi <strong th:text="${name}">User</strong>, enter this code to confirm your email address</p>

    <div class="otp-container">
        <div class="otp-code" id="otpCode" th:text="${otp}">000000</div>
        <button class="copy-btn" id="copyBtn" onclick="copyOTP()">📋 Copy OTP</button>
    </div>

    <div class="timer">Code expires in <strong th:text="${expiryMinutes}">10</strong> minutes</div>

    <div class="warning">
        ⚠️ Never share this code. WalletIQ will never ask for it.
    </div>

    <div class="links">
        <a href="https://linkedin.com">LinkedIn</a>
        <a href="https://github.com">GitHub</a>
        <a href="https://twitter.com">Twitter</a>
    </div>

    <div class="copyright">© 2026 WalletIQ. All rights reserved.</div>
</div>

<script>
    function copyOTP() {
        const otpElement = document.getElementById('otpCode');
        const copyBtn = document.getElementById('copyBtn');
        const otp = otpElement.innerText.trim();

        navigator.clipboard.writeText(otp).then(() => {
            // Show success feedback
            const originalText = copyBtn.innerText;
            copyBtn.innerText = '✓ Copied!';
            copyBtn.classList.add('copied');

            // Revert after 2 seconds
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.classList.remove('copied');
            }, 2000);
        }).catch(() => {
            copyBtn.innerText = '✗ Failed';
            setTimeout(() => {
                copyBtn.innerText = originalText;
            }, 2000);
        });
    }
</script>

</body>
</html>
