# ============================================================
# Development
# ============================================================

spring:

  # Database (local PostgreSQL)
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:walletiq}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: WalletIQHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000}    # 30 seconds
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}               # 10 minutes
      max-lifetime: ${DB_MAX_LIFETIME:1800000}              # 30 minutes
      auto-commit: true
      leak-detection-threshold: 60000                       # 1 minute

  # JPA (dev-only overrides)
  jpa:
    show-sql: true

  # Redis (local / Docker / Upstash)
  # Options:
  #   1. Upstash (Cloud)  → https://upstash.com, copy rediss:// URL
  #   2. Docker           → redis://localhost:6379
  #   3. Local install    → redis://localhost:6379
  # Note: SSL is required for Upstash (rediss://) URLs.
  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: true

  # Ollama (local instance)
  ai:
    ollama:
      base-url: http://localhost:11434

  # Mail (Gmail SMTP)
  # App-specific password required — NOT your Gmail password.
  # Setup: https://myaccount.google.com/apppasswords
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${MAIL_SSL_TRUST:*}
          quitwait: false
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

# Logging (verbose for development)
logging:
  level:
    root: info
    com.walletiq: debug
    org.springframework.web: debug
    org.springframework.security: debug
    org.springframework.ai.chat.client.advisor: debug
    org.springframework.data.redis: debug
    org.springframework.cache: trace