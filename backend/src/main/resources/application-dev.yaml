# Development
spring:
  config:
    activate:
      on-profile: dev
  autoconfigure:
    exclude:
      - org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration
      - org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5432/walletiq
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: WalletIQHikariPool
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:30000} # 30 seconds
      idle-timeout: ${DB_IDLE_TIMEOUT:600000}  # 10 minutes
      max-lifetime: ${DB_MAX_LIFETIME:1800000} # 30 minutes
      auto-commit: true
      leak-detection-threshold: 60000 # 1 minute

  # JPA
  jpa:
    show-sql: true

  # Redis
  data:
    redis:
      url: ${REDIS_URL}
      ssl:
        enabled: true

  # Ollama
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1:8b
          temperature: 0.7
      embedding:
        options:
          model: nomic-embed-text:v1.5
    vectorstore:
      pgvector:
        dimensions: 768
        distance-type: cosine_distance
        index-type: hnsw
        initialize-schema: false
        schema-name: public
        table-name: vector_store

  # Mail (Gmail SMTP)
  # App-specific password required — NOT your Gmail password.
  # Setup: https://myaccount.google.com/apppasswords
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${MAIL_SSL_TRUST:*}
          quitwait: false
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

