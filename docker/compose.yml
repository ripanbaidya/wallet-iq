services:

  postgres:
    image: postgres:16-alpine
    container_name: walletiq-postgres
    restart: on-failure
    environment:
      - POSTGRES_DB=walletiq
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - walletiq-network

volumes:
  postgres-data:

networks:
  walletiq-network:
    driver: bridge