events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression
    gzip       on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream: Spring Boot backend
    upstream backend {
        server backend:8080;
    }

    # Upstream: React frontend
    upstream frontend {
        server frontend:80;
    }

    # =======================================================
    # Phase 1 (now): accessible at http://156.67.111.21:8090
    # Phase 2 (later): add domain + SSL, switch to Traefik
    # =======================================================
    server {
        listen      80;
        server_name _;

        client_max_body_size 10M;

        # Backend API
        # All /api/* requests go to Spring Boot
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — generous for AI endpoints
            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        #  WebSocket (chat notifications)
        location /api/v1/ws {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade        $http_upgrade;
            proxy_set_header   Connection     "upgrade";
            proxy_set_header   Host           $host;
        }

        # Frontend (React SPA)
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
        }
    }

    # =======================================================
    # Phase 2 — Uncomment this block after adding domain + SSL
    # =======================================================
    # server {
    #     listen 443 ssl;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #
    #     # ... same location blocks as above ...
    # }
    #
    # # Redirect HTTP to HTTPS
    # server {
    #     listen 80;
    #     server_name yourdomain.com;
    #     return 301 https://$host$request_uri;
    # }
}