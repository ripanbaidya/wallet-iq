events {
    worker_connections 1024;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression
    gzip       on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream: Spring Boot backend
    upstream backend {
        server walletiq-backend:8080;
    }

    # =======================================================
    # Phase 1 (now): accessible at http://156.67.111.21:8090
    # Phase 2 (later): add domain + SSL, switch to Traefik
    # =======================================================
    server {
        listen      80;
        server_name _;

        client_max_body_size 10M;

        # Backend API
        # Proxy everything to Spring Boot
        location / {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts — generous for AI endpoints
            proxy_connect_timeout 60s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
        }

        #  WebSocket support for notifications: /api/v1/ws
        location /api/v1/ws {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade        $http_upgrade;
            proxy_set_header   Connection     "upgrade";
            proxy_set_header   Host           $host;
        }
    }
}