# Contains configuration for local development
# Use local docker-compose configuration when you want to run the application from IDE
# and use the services like - postgresql, redis, etc with docker.

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: walletiq-postgres
    mem_limit: 512m
    mem_reservation: 256m
    restart: on-failure
    environment:
      POSTGRES_DB: walletiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - walletiq_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d walletiq" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7.2-alpine
    container_name: walletiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - walletiq_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  walletiq_network:
    driver: bridge

volumes:
  pg_data:
  redis_data: