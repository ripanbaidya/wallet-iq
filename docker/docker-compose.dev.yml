# This file is intended for local development only.
# In production, managed services (e.g., Neon, Supabase, Upstash) should be used instead.

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: walletiq-postgres-dev
    restart: on-failure
    environment:
      POSTGRES_DB: walletiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - walletiq-dev

  redis:
    image: redis:7-alpine
    container_name: walletiq-redis-dev
    restart: on-failure
    ports:
      - "6379:6379"
    networks:
      - walletiq-dev

volumes:
  postgres_dev_data:

networks:
  walletiq-dev:
    driver: bridge