# docker-compose.local.yml
# This file contains the local development configuration for the WalletIQ application.
# Includes backend service, PostgreSQL database with pgvector extension, and Redis cache
# Optimized for local development and project demonstrations with proper health checks,
# resource limits, and security configurations

services:
  backend:
    image: ripanbaidya/walletiq-backend:1.0.0
    container_name: walletiq-backend-local
    restart: on-failure
    env_file:
      - .env.local
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - walletiq-local

  postgres:
    image: pgvector/pgvector:pg16
    container_name: walletiq-postgres-local
    restart: on-failure
    environment:
      POSTGRES_DB: walletiq
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    networks:
      - walletiq-local

  redis:
    image: redis:7.2-alpine
    container_name: walletiq-redis-local
    restart: on-failure
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --requirepass strongPassword
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "strongPassword", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-local-data:/data
    networks:
      - walletiq-local

volumes:
  postgres-local-data:
  redis-local-data:

networks:
  walletiq-local:
    driver: bridge