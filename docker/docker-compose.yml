# WalletIQ: Production Docker Compose
# Right now we are exposed port 8090 (Traefik already owns 80/443)
# will update it later

services:

  # Spring Boot Backend
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: walletiq-backend
    restart: unless-stopped
    env_file:
      - /opt/walletiq/.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
    expose:
      - "8080" # internal only, not exposed to internet
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - walletiq-net

  # React Frontend
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: walletiq-frontend
    restart: unless-stopped
    expose:
      - "80" # internal only
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - walletiq-net

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: walletiq-nginx
    restart: unless-stopped
    ports:
      - "8090:80" # expose 8090 to internet → nginx 80 internally
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - walletiq-net

networks:
  walletiq-net:
    driver: bridge