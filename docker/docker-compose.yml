# ==========================
# Production docker compose
# ==========================
services:

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: walletiq-backend
    restart: unless-stopped
    env_file:
      - /opt/walletiq/.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 8080
    expose:
      - "8080"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - walletiq-net

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    container_name: walletiq-frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - walletiq-net

  nginx:
    image: nginx:alpine
    container_name: walletiq-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - walletiq-net
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"

      # HTTPS router
      - "traefik.http.routers.walletiq-api.rule=Host(`api.walletiq.online`)"
      - "traefik.http.routers.walletiq-api.entrypoints=https"
      - "traefik.http.routers.walletiq-api.tls=true"
      - "traefik.http.routers.walletiq-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.walletiq-api.loadbalancer.server.port=80"

      # HTTP router → redirect to HTTPS
      - "traefik.http.routers.walletiq-api-http.rule=Host(`api.walletiq.online`)"
      - "traefik.http.routers.walletiq-api-http.entrypoints=http"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.routers.walletiq-api-http.middlewares=redirect-https"

networks:
  walletiq-net:
    driver: bridge
  web:
    external: true